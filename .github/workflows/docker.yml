name: Release 3X-UI for Docker

permissions:
  contents: read
  packages: write

env:
  CI_IMAGE_NAME: "3x-ui"
  CI_REGISTRY: "reg.vados.ru"

on:
    workflow_call:
  #    branches:
  #      - "**"
  #    tags:
  #      - "v*.*.*"

  #  schedule:
  #    - cron: "17 * * 3 1"

  workflow_dispatch:
    inputs:
      base_image:
        description: "Base image"
        required: true
        default: "alpine"
        type: string
      build_platforms:
        description: "Platforms for build images (e.g.
          linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7)"
        required: true
        default: "linux/amd64"
        type: string
      image_name:
        description: "Build image name"
        required: true
        default: "3x_app"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/vados-dev/3x_app
            reg.vados.ru/3x_app
          tags: |
            type=ref,event=tag
            type=pep440,pattern={{raw}}
            type=pep440,pattern={{majorr}}.{{minor}}.{{patch}}
            type=semver,pattern=v{{version}}
            type=raw,lts
          labels: |
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        id: push_login
        shell: bash
        env:
          REG_USER: ${{ vars.REG_USER }}
          REG_PASS: ${{ secrets.REG_PASS }}
          REG_SRV: ${{ vars.REG_SRV }}
        run: |
          set -euo pipefail
          #export ${ env.REG_PASS }
          #echo ${ env.REG_PASS } | 
          docker login -u ${REG_USER} -p ${REG_PASS} ${REG_SRV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          build-contexts: alpine=docker-image://${{ inputs.base_image }}
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


