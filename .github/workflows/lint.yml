name: Lint 14 master

on:
  push:
    branches:
      - master
  pull_request:

  workflow_dispatch:

jobs:
  docs:
    name: Check Docs
    runs-on: ubuntu-latest
    if: github.repository_owner == 'vados-dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        ref: v14

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/krypton"
          check-latest: true
          cache: "pnpm"

      - name: Check docs formatting
        run: |
          pnpm install
          pnpm format:check:docs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: docs

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        command: [ "lint", "typecheck", "format:check" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/krypton"
          check-latest: true
          cache: "pnpm"

      - name: pnpm ${{ matrix.command }}
        run: |
          cd src
          pnpm install
          pnpm ${{ matrix.command }}
