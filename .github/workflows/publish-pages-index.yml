name: Publish Pages Index

permissions:
  contents: write

on:
  workflow_call:
#  push:
#    branches:
#      - master
#    paths:
#      - README.md
#      - .github/workflows/publish-pages-index.yml
#      - .github/pages/site.json
#      - SOURCES/gh-pages.tar.gz
#  workflow_dispatch:

jobs:
  publish-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build index assets
        shell: bash
        run: |
          set -euo pipefail
          cp README.md /tmp/README.md
          cp .github/pages/site.json /tmp/site.json
          rm -rf /tmp/html-assets
          rm -f /tmp/style.tmp 
          mkdir -p /tmp/html-assets
          if [[ -f SOURCES/gh-pages.tar.gz ]]; then
            tar -xf SOURCES/gh-pages.tar.gz -C /tmp/html-assets || true
          fi

          project_title="$(jq -r '.projectTitle // "nginx-custom-builder"' /tmp/site.json)"
          title_prefix_json="$(jq -c '.titlePrefix // "[ vados-dev ] :: "' /tmp/site.json)"
          subtitle="$(jq -r '.subtitle // "Автогенерируемая страница из README.md (ветка gh-pages)."' /tmp/site.json)"

          jq -r '.links[]? | "<li><a href=\"" + (.href | @html) + "\">" + (.text | @html) + "</a></li>"' /tmp/site.json > /tmp/links.html
          jq -r '.quickLinks[]? | "<li><a href=\"" + (.href | @html) + "\">" + (.text | @html) + "</a></li>"' /tmp/site.json > /tmp/quick-links.html

          cat > /tmp/body-content-head.html <<HTML
          <main class="wrap">
            <section class="card">
              <h1>${project_title}</h1>
              <p class="muted">${subtitle}</p>
              <ul class="links">
              </ul>
              <ul class="quick">
              </ul>
              <article id="readme">Загрузка README...</article>
            </section>
          </main>
          HTML

          cat > /tmp/body-content-tail.html <<HTML
          <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
          <script>
            const titlePrefix = ${title_prefix_json};

            function updateDocumentTitle() {
              const heading = document.querySelector("#readme h1, #readme h2, .card h1, .card h2");
              if (!heading) return;
              const text = heading.textContent.trim();
              if (!text) return;
              document.title = titlePrefix + text;
            }

            async function render() {
              const target = document.getElementById("readme");
              try {
                const res = await fetch("./README.md", { cache: "no-store" });
                if (!res.ok) throw new Error("HTTP " + res.status);
                const md = await res.text();
                target.innerHTML = marked.parse(md);
                updateDocumentTitle();
              } catch (e) {
                target.textContent = "Не удалось загрузить README.md: " + e.message;
                updateDocumentTitle();
              }
            }

            if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", render, { once: true });
            } else {
              render();
            }
          </script>
          HTML

          cat /tmp/body-content-head.html > /tmp/body-content.html
          if [[ -s /tmp/links.html ]]; then
            sed -i '/<ul class="links">/r /tmp/links.html' /tmp/body-content.html
          fi
          if [[ -s /tmp/quick-links.html ]]; then
            sed -i '/<ul class="quick">/r /tmp/quick-links.html' /tmp/body-content.html
          fi
          cat /tmp/body-content-tail.html >> /tmp/body-content.html

          if [[ -f /tmp/html-assets/_tmpl/gh_top.html && -f /tmp/html-assets/_tmpl/gh_bottom.html ]]; then
            cat /tmp/html-assets/_tmpl/gh_top.html /tmp/body-content.html /tmp/html-assets/_tmpl/gh_bottom.html > /tmp/index.html
            cat > /tmp/style.tmp <<'tmp'
          <style>
              body { margin: 0; font-family: "Segoe UI", Roboto, sans-serif; }
              .wrap { max-width: 980px; margin: 0 auto; padding: 24px 0 24px; }
              .card { background: transparent; border: 1px dotted #6c5d53; border-radius: 5px; padding: 20px; }
              h1 { margin: 0 0 12px; font-size: 28px; }
              .muted { color: #6c5d53; margin-bottom: 16px; }
              .links { margin: 0 0 18px; padding: 0; list-style: none; display: flex; flex-wrap: wrap; gap: 10px; }
              .links a, .links a:visited, .links a:hover, .links a:focus-visible { text-decoration: none; border: 1px dotted #6c5d53; border-radius: 5px; padding: 8px 10px; color: #ff0000 !important; background: transparent; }
              .quick { margin: 0 0 18px; padding: 0; list-style: none; }
              .quick li { margin: 6px 0; }
              .quick a, .quick a:visited, .quick a:hover, .quick a:focus-visible { color: #ff0000 !important; text-decoration: none; }
              #readme a, #readme a:visited, #readme a:hover, #readme a:focus-visible { color: #ff0000 !important; }
              #readme { line-height: 1.55; overflow-wrap: anywhere; }
              #readme pre { background: #000; color: #6c5d53; border: 1px dotted #6c5d53; border-radius: 5px; padding: 12px; overflow-x: auto; white-space: pre-wrap; }
              #readme code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
              #readme table { border-collapse: collapse; }
              #readme th, #readme td { border: 1px dotted #e5e7eb; padding: 6px 8px; }
          </style>
          tmp
            sed -i '/STYLE_PLACEHOLDER/r /tmp/style.tmp' /tmp/index.html
            sed -i '/STYLE_PLACEHOLDER/d' /tmp/index.html
          else
            cat > /tmp/index.html <<HTML
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>${project_title}</title>
            <style>
              :root { color-scheme: light; }
              body { margin: 0; font-family: "Segoe UI", Roboto, sans-serif; background: #f6f8fa; color: #111827; }
              .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; }
              .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; }
              h1 { margin: 0 0 12px; font-size: 28px; }
              .muted { color: #6b7280; margin-bottom: 16px; }
              .links { margin: 0 0 18px; padding: 0; list-style: none; display: flex; flex-wrap: wrap; gap: 10px; }
              .links a, .links a:visited, .links a:hover, .links a:focus-visible { text-decoration: none; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 10px; color: #ff0000 !important; background: #f9fafb; }
              .quick { margin: 0 0 18px; padding: 0; list-style: none; }
              .quick li { margin: 6px 0; }
              .quick a, .quick a:visited, .quick a:hover, .quick a:focus-visible { color: #ff0000 !important; text-decoration: none; }
              #readme a, #readme a:visited, #readme a:hover, #readme a:focus-visible { color: #ff0000 !important; }
              #readme { line-height: 1.55; overflow-wrap: anywhere; }
              #readme pre { background: #0b1020; color: #e5e7eb; border-radius: 8px; padding: 12px; overflow-x: auto; }
              #readme code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
              #readme table { border-collapse: collapse; }
              #readme th, #readme td { border: 1px solid #e5e7eb; padding: 6px 8px; }
            </style>
          </head>
          <body>
            <!-- body content -->
            BODY_PLACEHOLDER
          </body>
          </html>
          HTML
            sed -i '/BODY_PLACEHOLDER/r /tmp/body-content.html' /tmp/index.html
            sed -i '/BODY_PLACEHOLDER/d' /tmp/index.html
          fi

      - name: Publish index to gh-pages
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          publish_root="/tmp/gh-pages-index"
          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"

          rm -rf "${publish_root}"
          mkdir -p "${publish_root}"
          cd "${publish_root}"

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "${remote_url}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth 1 origin gh-pages
            git reset --hard FETCH_HEAD
          fi

          cp -f /tmp/index.html index.html
          cp -f /tmp/README.md README.md
          find . -mindepth 1 -maxdepth 1 -type d \( -name '_*' -o -name 'assets' \) -exec rm -rf {} +
          if [[ -d /tmp/html-assets ]]; then
            cp -a /tmp/html-assets/. .
          fi
          cp -f /tmp/index.html index.html
          cp -f /tmp/README.md README.md

          html_escape() {
            local s="${1:-}"
            s="${s//&/&amp;}"
            s="${s//</&lt;}"
            s="${s//>/&gt;}"
            s="${s//\"/&quot;}"
            printf '%s' "${s}"
          }

          url_escape() {
            jq -nr --arg v "${1:-}" '$v|@uri'
          }

          icon_for_file() {
            local name lower ext
            name="${1:-}"
            lower="$(tr '[:upper:]' '[:lower:]' <<< "${name}")"
            ext="${lower##*.}"

            case "${ext}" in
              rpm|apk|deb|pkg|msi|exe) echo "box2.png" ;;
              tar|gz|tgz|bz2|xz|zst|zip|7z|rar) echo "compressed.png" ;;
              txt|md|rst|log|ini|cfg|conf|yaml|yml|json|toml|xml|csv|tsv) echo "text.png" ;;
              sh|bash|zsh|fish|ps1|cmd|bat|py|pl|rb|php|js|ts|lua) echo "script.png" ;;
              c|h|cpp|hpp|cc|go|rs|java|cs|swift|kt) echo "c.png" ;;
              png|jpg|jpeg|gif|webp|svg|bmp|ico|tif|tiff|avif) echo "image3.png" ;;
              mp4|mkv|avi|mov|wmv|webm|m4v) echo "movie.png" ;;
              mp3|flac|ogg|wav|m4a|aac) echo "sound2.png" ;;
              pdf) echo "pdf.png" ;;
              iso|img|qcow2|vmdk) echo "diskimg.png" ;;
              sig|asc|sha256|sha512|sum) echo "quill.png" ;;
              *) echo "generic.png" ;;
            esac
          }

          render_dir_index() {
            local dir="$1"
            local rel="${dir#./}"
            local title="Index of /${rel}"
            local body_tmp style_tmp top_tmp up_prefix icon_base readme_file readme_kind
            body_tmp="$(mktemp)"
            style_tmp="$(mktemp)"
            top_tmp="$(mktemp)"
            up_prefix="$(awk -F'/' '{ for(i=1;i<=NF;i++) printf "../" }' <<< "${rel}")"
            icon_base="${up_prefix}assets/icons/listing"
            readme_file=""
            readme_kind=""
            if [[ -f "${dir}/README.md" ]]; then
              readme_file="README.md"
              readme_kind="md"
            elif [[ -f "${dir}/README.txt" ]]; then
              readme_file="README.txt"
              readme_kind="txt"
            fi

            cat > "${style_tmp}" <<'STYLE'
          <style>
            .dir-list { margin: 0; padding: 0; list-style: none; }
            .dir-list li { margin: 6px 0; word-break: break-word; display: flex; align-items: center; gap: 8px; }
            .dir-list a, .dir-list a:visited, { color: #ff0000 !important; text-decoration: none; }
            .dir-list a:hover, .dir-list a:focus-visible { color: #ff0000 !important; text-decoration: underline; }
            #readme a, #readme a:visited, #readme a:hover, #readme a:focus-visible { color: #ff0000 !important; }
            .dir-list img { width: 20px; height: 22px; image-rendering: auto; flex: 0 0 auto; }
            #readme { line-height: 1.55; overflow-wrap: anywhere; margin: 18px 0; }
            #readme pre { background: #000; color: #6c5d53; border: 1px dotted #6c5d53; border-radius: 5px; padding: 12px; overflow-x: auto; white-space: pre-wrap; }
            #readme code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
            #readme table { border-collapse: collapse; }
            #readme th, #readme td { border: 1px dotted #e5e7eb; padding: 6px 8px; }
            .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
          </style>
          STYLE

            {
              printf '<!-- AUTOGEN_DIR_INDEX -->\n'
              printf '<main class="wrap">\n'
              printf '  <section class="card">\n'
              printf '    <h1 class="mono">%s</h1>\n' "$(html_escape "${title}")"
              printf '    <p class="muted">Directory listing generated by workflow.</p>\n'
              printf '    <ul class="links">\n'
              printf '      <li><a href="../">.. (up)</a></li>\n'
              printf '      <li><a href="./%s">site root</a></li>\n' "${up_prefix}"
              printf '    </ul>\n'
              if [[ -n "${readme_file}" ]]; then
                printf '    <article id="readme">Loading %s...</article>\n' "$(html_escape "${readme_file}")"
              fi
              printf '    <ul class="dir-list">\n'

              while IFS= read -r -d '' child_dir; do
                local name enc
                name="$(basename "${child_dir}")"
                enc="$(url_escape "${name}")"
                printf '      <li><img src="./%s/folder.png" alt="[DIR]" /><a href="./%s/">%s/</a></li>\n' "${icon_base}" "${enc}" "$(html_escape "${name}")"
              done < <(find "${dir}" -mindepth 1 -maxdepth 1 -type d ! -name '.*' -print0 | sort -z)

              while IFS= read -r -d '' child_file; do
                local name enc icon
                name="$(basename "${child_file}")"
                enc="$(url_escape "${name}")"
                icon="$(icon_for_file "${name}")"
                printf '      <li><img src="./%s/%s" alt="[FILE]" /><a href="./%s">%s</a></li>\n' "${icon_base}" "${icon}" "${enc}" "$(html_escape "${name}")"
              done < <(find "${dir}" -mindepth 1 -maxdepth 1 -type f ! -name 'index.html' ! -name 'README.md' ! -name 'README.txt' ! -name '.DS_Store' ! -name 'Thumbs.db' -print0 | sort -z)

              printf '    </ul>\n'
              if [[ -n "${readme_file}" ]]; then
                if [[ "${readme_kind}" == "md" ]]; then
                  printf '<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>\n'
                  printf '<script>\n'
                  printf '  (async function(){\n'
                  printf '    const t=document.getElementById("readme");\n'
                  printf '    try {\n'
                  printf '      const r=await fetch("./README.md",{cache:"no-store"});\n'
                  printf '      if(!r.ok) throw new Error("HTTP "+r.status);\n'
                  printf '      const md=await r.text();\n'
                  printf '      t.innerHTML=marked.parse(md);\n'
                  printf '    } catch(e) { t.textContent="Failed to load README.md: "+e.message; }\n'
                  printf '  })();\n'
                  printf '</script>\n'
                else
                  printf '<script>\n'
                  printf '  (async function(){\n'
                  printf '    const t=document.getElementById("readme");\n'
                  printf '    try {\n'
                  printf '      const r=await fetch("./README.txt",{cache:"no-store"});\n'
                  printf '      if(!r.ok) throw new Error("HTTP "+r.status);\n'
                  printf '      const text=await r.text();\n'
                  printf '      const pre=document.createElement("pre");\n'
                  printf '      pre.textContent=text;\n'
                  printf '      t.replaceChildren(pre);\n'
                  printf '    } catch(e) { t.textContent="Failed to load README.txt: "+e.message; }\n'
                  printf '  })();\n'
                  printf '</script>\n'
                fi
              fi
              printf '  </section>\n'
              printf '</main>\n'
              printf '<script>document.title = %s;</script>\n' "$(jq -nr --arg v "[ vados-dev ] :: ${title}" '$v|@json')"
            } > "${body_tmp}"

            if [[ -f _tmpl/gh_top.html && -f _tmpl/gh_bottom.html ]]; then
              sed \
                -e 's|href="\./|href="'"${up_prefix}"'|g' \
                -e 's|src="\./|src="'"${up_prefix}"'|g' \
                -e 's|window.location = "/"|window.location = "'"${up_prefix}"'"|g' \
                _tmpl/gh_top.html > "${top_tmp}"
              cat "${top_tmp}" "${body_tmp}" _tmpl/gh_bottom.html > "${dir}/index.html"
              sed -i '/STYLE_PLACEHOLDER/r '"${style_tmp}"'' "${dir}/index.html" || true
              sed -i '/STYLE_PLACEHOLDER/d' "${dir}/index.html" || true
            else
              cat > "${dir}/index.html" <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>${title}</title>
            <style>
              body { margin: 0; font-family: "Segoe UI", Roboto, sans-serif; background: #f6f8fa; color: #111827; }
              .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; }
              .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; }
              .muted { color: #6b7280; margin-bottom: 16px; }
              .links { margin: 0 0 18px; padding: 0; list-style: none; display: flex; flex-wrap: wrap; gap: 10px; }
              .links a, .links a:visited, .links a:hover, .links a:focus-visible { text-decoration: none; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 10px; color: #ff0000 !important; background: #f9fafb; }
              .dir-list { margin: 0; padding: 0; list-style: none; }
              .dir-list li { margin: 6px 0; word-break: break-word; display: flex; align-items: center; gap: 8px; }
              .dir-list a, .dir-list a:visited, .dir-list a:hover, .dir-list a:focus-visible { color: #ff0000 !important; text-decoration: none; }
              #readme a, #readme a:visited, #readme a:hover, #readme a:focus-visible { color: #ff0000 !important; }
              .dir-list img { width: 20px; height: 22px; image-rendering: auto; flex: 0 0 auto; }
              #readme { line-height: 1.55; overflow-wrap: anywhere; margin: 18px 0; }
              #readme pre { background: #0b1020; color: #e5e7eb; border-radius: 8px; padding: 12px; overflow-x: auto; white-space: pre-wrap; }
              #readme code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
              #readme table { border-collapse: collapse; }
              #readme th, #readme td { border: 1px solid #e5e7eb; padding: 6px 8px; }
              .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
            </style>
          </head>
          <body>
            BODY_PLACEHOLDER
          </body>
          </html>
          HTML
              sed -i '/BODY_PLACEHOLDER/r '"${body_tmp}"'' "${dir}/index.html"
              sed -i '/BODY_PLACEHOLDER/d' "${dir}/index.html"
            fi

            rm -f "${body_tmp}" "${style_tmp}" "${top_tmp}"
          }

          if [[ -d repo ]]; then
            find ./repo -type f -name 'README.html' -delete
            while IFS= read -r -d '' dir; do
              if [[ -f "${dir}/index.html" ]] && ! grep -q 'AUTOGEN_DIR_INDEX' "${dir}/index.html"; then
                continue
              fi
              render_dir_index "${dir}"
            done < <(find ./repo -type d -print0 | sort -z)
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No index/README changes to publish."
            exit 0
          fi

          git commit -m "pages: update root index from README (run ${GITHUB_RUN_ID})"
          git push origin gh-pages
