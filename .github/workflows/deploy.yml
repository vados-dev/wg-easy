name: Build & Deploy master

env:
  DEFAULT_BRANCH: master
  #  DEFAULT_TAG: v15lts
  REGISTRY_IMAGE: ghcr.io/vados-dev/wg-easy
#  DEFAULT_PUBLISH_REPOS: true

on:
  #   schedule:
  #     - cron: "17 * * 3 1"
  push:
    branches: 
      - "master"
  pull_request:

  #    tags: [ "[0-9]+.[0-9]+.[0-9]+", "v15-rb.lts", "v*.*." ]
  workflow_dispatch:
    inputs:
      build_image:
        description: "Image name for buld."
        required: true
        default: "ghcr.io/vados-dev/wg-easy"
        type: string
      build_tag:
        description: "Build tag for the Docker image"
        required: true
        default: "rb15lts"
        type: string
      build_platforms:
        description: "Build platforms e.g.
          (linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8)"
        required: true
        default: "linux/amd64"
        type: string

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.repository_owner == 'vados-dev'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=false
          labels: |
            maintainer={{ github.actor }}
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.revision={{commit_short}}
            org.opencontainers.image.version={{version}}
            org.opencontainers.image.url={{url}}
            org.opencontainers.image.source={{url}}
            org.opencontainers.image.documentation={{url}} 

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.build_tag ||
            'rb15lts' }}
          IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_image ||
            env.REGISTRY_IMAGE }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{inputs.build_platforms}}
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=min,scope=build-${{ env.PLATFORM_PAIR }}
          tags: ${{env.IMAGE}}:${{env.TAG}}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.ref.name=${{ steps.meta.outputs.version }}          
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
