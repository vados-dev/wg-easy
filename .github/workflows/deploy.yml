name: Build & Deploy

permissions:
  packages: write
  contents: read
  #env:
  #  DEFAULT_PUBLISH_REPOS: true

on:
  #  workflow_call:
  push:
    branches:
      - "**"
    tags:
      - "v*.*."
  #   schedule:
  #     - cron: "17 * * 3 1"
  workflow_dispatch:
    inputs:
      from_branch:
        description: "Branch for build and deploy"
        required: true
        default: "master"
        type: string
      build_images:
        description: "Image name for buld targrest."
        required: true
        default: "wg-easy"
        type: string
      build_tag:
        description: "Build tag for the Docker image"
        required: true
        default: "v15-rb.lts"
        type: string
      build_platforms:
        description: "Build platforms e.g.
          (linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8)"
        required: true
        default: "linux/amd64"
        type: string

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{inputs.}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{inputs.build_platforms}}
          tags: ghcr.io/vados-dev/${{inputs.build_images}}:latest,
            ghcr.io/vados-dev/${{inputs.build_images}}:${{inputs.build_tag}}
