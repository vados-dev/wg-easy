name: Cleanup Workflow Runs

permissions:
  actions: write
  contents: read

on:
  schedule:
    - cron: "47 4 * * 1"
  workflow_dispatch:
    inputs:
      keep_runs_per_workflow:
        description: "How many latest runs to keep for each non-cleanup workflow"
        required: false
        type: number
        default: 3
      purge_cleanup_workflow_runs:
        description: "Delete all runs of this cleanup workflow (for full purge)"
        required: false
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_WORKFLOW_NAME: ${{ github.workflow }}
          KEEP_RUNS_PER_WORKFLOW: ${{ github.event.inputs.keep_runs_per_workflow || '3' }}
          PURGE_CLEANUP_WORKFLOW_RUNS: ${{ github.event.inputs.purge_cleanup_workflow_runs || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          page=1
          seen=0
          skipped=0
          kept=0
          deleted=0
          failed=0
          runs_file="$(mktemp)"
          delete_file="$(mktemp)"

          if ! [[ "${KEEP_RUNS_PER_WORKFLOW}" =~ ^[0-9]+$ ]]; then
            echo "Invalid KEEP_RUNS_PER_WORKFLOW='${KEEP_RUNS_PER_WORKFLOW}', fallback to 3"
            KEEP_RUNS_PER_WORKFLOW=3
          fi

          while :; do
            resp="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/runs?per_page=100&page=${page}")"

            count="$(echo "${resp}" | jq '.workflow_runs | length')"
            if [[ "${count}" -eq 0 ]]; then
              break
            fi

            while IFS=$'\t' read -r run_id created_at workflow_name workflow_id; do
              [[ -z "${run_id}" ]] && continue
              seen=$((seen + 1))
              printf '%s\t%s\t%s\t%s\n' "${run_id}" "${created_at}" "${workflow_name}" "${workflow_id}" >> "${runs_file}"
            done < <(echo "${resp}" | jq -r '.workflow_runs[] | [.id, .created_at, .name, .workflow_id] | @tsv')

            page=$((page + 1))
          done

          declare -A kept_by_workflow
          while IFS=$'\t' read -r run_id created_at workflow_name workflow_id; do
            [[ -z "${run_id}" ]] && continue

            if [[ "${PURGE_CLEANUP_WORKFLOW_RUNS}" == "true" && "${workflow_name}" == "${CURRENT_WORKFLOW_NAME}" ]]; then
              printf '%s\t%s\n' "${run_id}" "${created_at}" >> "${delete_file}"
              continue
            fi

            workflow_key="${workflow_id}"
            if [[ -z "${workflow_key}" || "${workflow_key}" == "null" ]]; then
              workflow_key="name:${workflow_name}"
            fi

            current_kept="${kept_by_workflow[$workflow_key]:-0}"
            if (( current_kept < KEEP_RUNS_PER_WORKFLOW )); then
              kept_by_workflow[$workflow_key]=$((current_kept + 1))
              kept=$((kept + 1))
              continue
            fi

            printf '%s\t%s\n' "${run_id}" "${created_at}" >> "${delete_file}"
          done < "${runs_file}"

          while IFS=$'\t' read -r run_id created_at; do
            [[ -z "${run_id}" ]] && continue
            echo "Deleting run ${run_id} (${created_at})"
            if curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/runs/${run_id}" \
              >/dev/null; then
              deleted=$((deleted + 1))
            else
              echo "Warning: failed to delete run ${run_id} (may be current/in-progress)."
              failed=$((failed + 1))
            fi
          done < "${delete_file}"

          rm -f "${runs_file}"
          rm -f "${delete_file}"

          echo "Seen workflow runs: ${seen}"
          echo "Skipped workflow runs: ${skipped}"
          echo "Kept workflow runs: ${kept}"
          echo "Deleted workflow runs: ${deleted}"
          echo "Failed deletions: ${failed}"
